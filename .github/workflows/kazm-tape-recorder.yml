name: KAZM Tape Recorder

# Records the live stream in 5h30m blocks, stores each as a GitHub Release asset,
# and keeps rewind-manifest.json current so the Listeners Lounge tape player works.
# Blocks (releases) are deleted after 14 days. GitHub Releases sidesteps the
# AzuraCast nginx client_max_body_size limit that was killing every upload.

on:
  schedule:
    # 1:01, 7:01, 13:01, 19:01 UTC = 18:01, 0:01, 6:01, 12:01 Arizona (UTC-7)
    - cron: "1 1,7,13,19 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: 'Recording duration in seconds (default: 19800 = 5h30m full block)'
        required: false
        default: '19800'

permissions:
  contents: write

concurrency:
  group: kazm-tape
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 380
    steps:
      - uses: actions/checkout@v4

      - name: Compute block identity (Arizona time, UTC-7 fixed offset)
        id: block
        run: |
          AZ_EPOCH=$(( $(date -u +%s) - 7*3600 ))
          YEAR=$(date -u -d "@$AZ_EPOCH" +%Y)
          MONTH=$(date -u -d "@$AZ_EPOCH" +%m)
          DAY=$(date -u -d "@$AZ_EPOCH" +%d)
          HOUR=$(date -u -d "@$AZ_EPOCH" +%H)
          BLOCK_HOUR=$(( (10#$HOUR / 6) * 6 ))
          BLOCK_PAD=$(printf "%02d" $BLOCK_HOUR)
          FILENAME="kazm-${YEAR}-${MONTH}-${DAY}-${BLOCK_PAD}00"
          DATE_STR="${YEAR}-${MONTH}-${DAY}"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "date=$DATE_STR"     >> "$GITHUB_OUTPUT"
          echo "start=$BLOCK_HOUR"  >> "$GITHUB_OUTPUT"
          echo "[tape] block: $FILENAME (AZ $DATE_STR $BLOCK_HOUR:00)"

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Prune GitHub releases older than 14 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, json
          from datetime import datetime, timezone, timedelta

          cutoff = (datetime.now(timezone.utc) - timedelta(days=14)).strftime("%Y-%m-%dT%H:%M:%SZ")
          result = subprocess.run(
              ['gh', 'release', 'list', '--repo', 'chelstein/mellowmountainradio',
               '--json', 'tagName,publishedAt', '--limit', '100'],
              capture_output=True, text=True
          )
          releases = json.loads(result.stdout or '[]')
          deleted = 0
          for r in releases:
              if r.get('tagName', '').startswith('tape-') and r['publishedAt'] < cutoff:
                  subprocess.run(['gh', 'release', 'delete', r['tagName'],
                                  '--repo', 'chelstein/mellowmountainradio',
                                  '--yes', '--cleanup-tag'], capture_output=True)
                  print(f"[tape] pruned {r['tagName']}")
                  deleted += 1
          print(f"[tape] pruned {deleted} old release(s)")
          PYEOF

      - name: Record stream
        id: recording
        run: |
          FILENAME="${{ steps.block.outputs.filename }}"
          DURATION="${{ github.event.inputs.duration }}"
          if [ -z "$DURATION" ]; then DURATION=19800; fi
          REC_START_SECS=$(( ($(date -u +%s) - 7*3600) % 86400 ))
          echo "rec_start=$REC_START_SECS" >> "$GITHUB_OUTPUT"
          echo "[tape] recording /tmp/${FILENAME}.mp3 for ${DURATION}s (AZ offset: ${REC_START_SECS}s from midnight)"
          ffmpeg -hide_banner -loglevel error \
            -i "https://streaming.mellowmountainradio.com/listen/mellowmountainradio/radio.mp3" \
            -t "$DURATION" -c copy -y "/tmp/${FILENAME}.mp3"
          if [ ! -s "/tmp/${FILENAME}.mp3" ]; then
            echo "[tape] recording came out empty" >&2
            exit 1
          fi
          echo "[tape] done — $(stat -c%s "/tmp/${FILENAME}.mp3") bytes"

      - name: Upload to GitHub Release
        id: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILENAME="${{ steps.block.outputs.filename }}"
          TAG="tape-${FILENAME}"

          # Delete any existing release for this block slot before re-creating
          gh release delete "$TAG" --repo chelstein/mellowmountainradio \
            --yes --cleanup-tag 2>/dev/null || true

          gh release create "$TAG" \
            --repo chelstein/mellowmountainradio \
            --title "KAZM tape: $FILENAME" \
            --notes "Automated broadcast recording. Auto-deleted after 14 days." \
            --prerelease \
            "/tmp/${FILENAME}.mp3#${FILENAME}.mp3"

          DOWNLOAD_URL="https://github.com/chelstein/mellowmountainradio/releases/download/${TAG}/${FILENAME}.mp3"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "[tape] uploaded: $DOWNLOAD_URL"
          rm -f "/tmp/${FILENAME}.mp3"

      - name: Commit and push manifest
        run: |
          git config user.name "mmr-tape-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          URL="${{ steps.upload.outputs.download_url }}"
          DATE_STR="${{ steps.block.outputs.date }}"
          START_H="${{ steps.block.outputs.start }}"
          REC_START="${{ steps.recording.outputs.rec_start }}"
          FILENAME="${{ steps.block.outputs.filename }}"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git checkout origin/main
            python3 - "$URL" "$DATE_STR" "$START_H" "$REC_START" <<'PYEOF'
          import sys, json
          from datetime import datetime, timezone, timedelta

          url       = sys.argv[1]
          date_str  = sys.argv[2]
          start_h   = int(sys.argv[3])
          rec_start = int(sys.argv[4]) if len(sys.argv) > 4 and sys.argv[4] else start_h * 3600

          new_block = {"url": url, "date": date_str, "start": start_h, "recStart": rec_start}

          with open("rewind-manifest.json") as f:
              manifest = json.load(f)

          cutoff_str = (datetime.now(timezone.utc) - timedelta(days=14)).strftime("%Y-%m-%d")
          kept = [b for b in manifest.get("blocks", []) if b.get("date", "") >= cutoff_str]
          kept = [b for b in kept if not (b["date"] == date_str and b["start"] == start_h)]
          kept.append(new_block)
          kept.sort(key=lambda b: (b["date"], b["start"]))

          manifest["ok"]     = True
          manifest["blocks"] = kept

          with open("rewind-manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          print(f"[tape] manifest updated: {len(kept)} block(s)")
          PYEOF
            git add rewind-manifest.json
            if git diff --staged --quiet; then
              echo "[tape] no manifest changes"
              exit 0
            fi
            git commit -m "KAZM tape: $FILENAME [skip ci]"
            git push origin HEAD:main && exit 0
            echo "[tape] push failed (attempt $attempt/5), retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "[tape] all push attempts failed" >&2
          exit 1
