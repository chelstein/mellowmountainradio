<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAZM Live · Mellow Mountain Radio</title>
<style>
/* ── KAZM Mountain Dashboard ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#17130f;
  color:#ede5d8;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:13px;
  line-height:1.4;
  min-height:100vh;
  overflow-x:hidden;
}
:root{
  --gold:#c9a960;
  --gold-dim:#7a6030;
  --red:#c93333;
  --bg:#17130f;
  --bg2:#1f1a15;
  --bg3:#28201a;
  --border:rgba(201,169,96,.14);
  --text:#ede5d8;
  --muted:#80756a;
  --art:#2a2018;
  --r:8px;
}

/* ── Grid ─────────────────────────────────────────────────────── */
.panel{
  display:grid;
  grid-template-columns:210px 1fr 200px;
  gap:12px;
  padding:16px;
  max-width:900px;
  margin:0 auto;
}
@media(max-width:680px){.panel{grid-template-columns:1fr}}
@media(min-width:681px) and (max-width:780px){
  .panel{grid-template-columns:1fr 1fr}
  .col-c{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
}

/* ── Card ─────────────────────────────────────────────────────── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:13px;
}

/* ── Eyebrow ──────────────────────────────────────────────────── */
.ey{
  font-size:9px;font-weight:800;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gold-dim);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}

/* ── Live dot ─────────────────────────────────────────────────── */
.dot{
  width:7px;height:7px;border-radius:50%;background:var(--red);
  flex-shrink:0;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(201,51,51,.5)}
  50%{opacity:.3;box-shadow:0 0 0 6px rgba(201,51,51,0)}
}

/* ── Now Playing ──────────────────────────────────────────────── */
.np-row{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px}
.art-wrap{
  width:76px;height:76px;border-radius:6px;overflow:hidden;
  background:var(--art);flex-shrink:0;position:relative;
}
.art-img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:opacity .5s;
}
.art-img.fade{opacity:0}

/* Animated EQ bars */
.eq{
  position:absolute;bottom:0;left:0;right:0;height:22px;
  display:flex;align-items:flex-end;gap:2px;padding:0 5px 3px;
  background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 100%);
}
.eq-b{
  flex:1;border-radius:1px 1px 0 0;
  background:var(--gold);opacity:.9;
  animation:eq 1.3s ease-in-out infinite;
}
.eq-b:nth-child(1){animation-duration:1.05s;animation-delay:0s}
.eq-b:nth-child(2){animation-duration:1.5s;animation-delay:.15s}
.eq-b:nth-child(3){animation-duration:.88s;animation-delay:.3s}
.eq-b:nth-child(4){animation-duration:1.25s;animation-delay:.05s}
.eq-b:nth-child(5){animation-duration:1.1s;animation-delay:.22s}
.eq-b:nth-child(6){animation-duration:.8s;animation-delay:.38s}
@keyframes eq{0%,100%{height:3px}50%{height:15px}}

.np-info{flex:1;min-width:0;padding-top:3px}
.np-title{
  font-size:14px;font-weight:700;color:var(--text);line-height:1.25;
  margin-bottom:4px;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.np-artist{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-album{font-size:10px;color:var(--muted);opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

.np-foot{
  display:flex;align-items:center;gap:8px;
  padding-top:10px;border-top:1px solid var(--border);
}
.listeners{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);flex:1}
.listeners svg{opacity:.55;flex-shrink:0}

.tune{
  background:var(--gold);color:#17130f;font-weight:800;
  font-size:10px;letter-spacing:.07em;text-transform:uppercase;
  padding:5px 11px;border-radius:5px;text-decoration:none;
  flex-shrink:0;display:inline-block;transition:background .15s,transform .1s;
}
.tune:hover{background:#d4b474;transform:translateY(-1px)}

/* ── History ──────────────────────────────────────────────────── */
.hist{list-style:none}
.hi{
  display:flex;align-items:center;gap:8px;
  padding:5px 4px;margin:0 -4px;border-radius:5px;
  border-bottom:1px solid rgba(255,255,255,.04);
  text-decoration:none;color:inherit;
  transition:background .12s;cursor:pointer;
}
.hi:last-child{border-bottom:none}
.hi:hover{background:rgba(255,255,255,.06)}
.hi-n{width:15px;text-align:right;font-size:10px;color:var(--muted);opacity:.5;flex-shrink:0}
.hi-art{
  width:32px;height:32px;border-radius:4px;
  object-fit:cover;background:var(--art);flex-shrink:0;display:block;
}
.hi-info{flex:1;min-width:0}
.hi-t{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-a{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.hi-ic{flex-shrink:0;color:var(--gold);opacity:0;transition:opacity .15s}
.hi:hover .hi-ic{opacity:.7}

/* ── Right column ─────────────────────────────────────────────── */
.col-c{display:flex;flex-direction:column;gap:12px}
.show-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.show-host{font-size:11px;color:var(--gold);margin-bottom:4px}
.show-desc{font-size:11px;color:var(--muted);line-height:1.5}
.show-next{
  margin-top:9px;padding-top:8px;
  border-top:1px solid var(--border);
  font-size:10px;color:var(--muted);
}
.show-next strong{color:var(--text)}

.wx-row{display:flex;align-items:center;gap:12px}
.wx-temp{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.wx-short{font-size:11px;color:var(--muted);line-height:1.4}
.wx-loc{font-size:10px;color:var(--gold-dim);margin-top:3px}

.links{display:flex;flex-direction:column;gap:1px}
.links a{
  display:flex;align-items:center;gap:8px;padding:5px 4px;
  color:var(--gold);text-decoration:none;font-size:12px;
  border-radius:4px;transition:color .13s,background .13s;
}
.links a:hover{color:#d4b474;background:rgba(201,169,96,.06)}
.links svg{opacity:.55;flex-shrink:0}

.kmd-err{font-size:11px;color:var(--muted);font-style:italic}
</style>
</head>
<body>
<div class="panel">

  <!-- ── Now Playing ──────────────────────────────── -->
  <div class="card">
    <div class="ey"><span class="dot"></span>On Air Now</div>
    <div class="np-row">
      <div class="art-wrap">
        <img class="art-img" id="kz-art" src="" alt="">
        <div class="eq">
          <div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div>
          <div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div>
        </div>
      </div>
      <div class="np-info">
        <div class="np-title" id="kz-title">Tuning in&hellip;</div>
        <div class="np-artist" id="kz-artist">&nbsp;</div>
        <div class="np-album" id="kz-album">&nbsp;</div>
      </div>
    </div>
    <div class="np-foot">
      <div class="listeners">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span id="kz-count">&mdash;</span>
      </div>
      <a class="tune" href="https://mellowmountainradio.com" target="_blank" rel="noopener">Listen Live &rsaquo;</a>
    </div>
  </div>

  <!-- ── Recently Played ──────────────────────────── -->
  <div class="card">
    <div class="ey">Recently Played</div>
    <ul class="hist" id="kz-hist">
      <li><span class="kmd-err">Loading&hellip;</span></li>
    </ul>
  </div>

  <!-- ── Right column ─────────────────────────────── -->
  <div class="col-c">

    <div class="card">
      <div class="ey">What&rsquo;s On</div>
      <div class="show-name" id="kz-show">&mdash;</div>
      <div class="show-host" id="kz-host"></div>
      <div class="show-desc" id="kz-desc"></div>
      <div class="show-next" id="kz-next"></div>
    </div>

    <div class="card">
      <div class="ey">Sedona Conditions</div>
      <div id="kz-wx"><span class="kmd-err">Loading&hellip;</span></div>
    </div>

    <div class="card">
      <div class="ey">KAZM 106.5 &middot; 780 AM</div>
      <div class="links">
        <a href="https://mellowmountainradio.com" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          mellowmountainradio.com
        </a>
        <a href="https://mellowmountainradio.com/rewind" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
          Listeners&rsquo; Lounge &amp; Time Machine
        </a>
        <a href="https://aac.mellowmountainradio.com/radio.mp3" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
          HiFi AAC Stream
        </a>
        <a href="https://mellowmountainradio.com/schedule.html" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
          Full Program Schedule
        </a>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
'use strict';
var AZ   = 'https://streaming.mellowmountainradio.com/api/nowplaying/mellowmountainradio';
var SCHED= 'https://mellowmountainradio.com/schedule.json';
var WX   = 'https://api.weather.gov/points/34.8697,-111.7610';
var SKIP_A=['live365','station id'];
var SKIP_T=['adbreak','sweeper_'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function isReal(a,t){
  var al=(a||'').toLowerCase(),tl=(t||'').toLowerCase();
  return !SKIP_A.some(function(x){return al.indexOf(x)>=0})&&!SKIP_T.some(function(x){return tl.indexOf(x)>=0});
}
function gel(id){return document.getElementById(id)}
function amLink(a,t){return 'https://music.apple.com/search?term='+encodeURIComponent((a+' '+t).trim())}

/* ── Schedule ────────────────────────────────────── */
var sched=null;
function mtnMin(){
  var d=new Date(),u=d.getUTCHours()*60+d.getUTCMinutes();
  return((u-420)+1440)%1440;
}
function parseT(s){var p=s.split(':');return+p[0]*60+ +p[1]}
function fmtT(s){var p=s.split(':'),h=+p[0]%24,m=+p[1],ap=h<12?'am':'pm';h=h%12||12;return h+(m?':'+('0'+m).slice(-2):'')+' '+ap}
function getShow(items){
  if(!items||!items.length)return null;
  var now=mtnMin(),day=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
  for(var i=0;i<items.length;i++){
    var s=items[i];
    if(s.days&&s.days.indexOf(day)===-1)continue;
    var st=parseT(s.start),en=parseT(s.end);
    if(en<=st)en+=1440;
    var n2=(now<st&&en>1440)?now+1440:now;
    if(n2>=st&&n2<en)return{cur:s,next:items[(i+1)%items.length]};
  }
  return null;
}
function renderSched(){
  if(!sched)return;
  var pool=(sched.weekday||[]).concat(sched.weekend||[]);
  var f=getShow(pool);
  if(!f){gel('kz-show').textContent='KAZM 106.5 FM';return}
  var c=f.cur,n=f.next;
  gel('kz-show').textContent=(c.emoji?c.emoji+' ':'')+c.name;
  gel('kz-host').textContent=c.host?'with '+c.host:'';
  gel('kz-desc').textContent=c.description||'';
  gel('kz-next').innerHTML=n?'Up next: <strong>'+esc(n.name)+'</strong> at '+esc(fmtT(n.start)):'';
}
function loadSched(){
  fetch(SCHED+'?_='+Date.now()).then(function(r){return r.json()}).then(function(d){sched=d;renderSched()}).catch(function(){});
}

/* ── AzuraCast ───────────────────────────────────── */
var lastKey='',fadeTimer=null;
function loadAZ(){
  fetch(AZ+'?_='+Date.now()).then(function(r){return r.json()}).then(function(d){
    var np=d.now_playing,a=np.song.artist||'',t=np.song.title||'',alb=np.song.album||'',art=np.song.art||'';
    if(a+'|'+t!==lastKey&&isReal(a,t)){
      lastKey=a+'|'+t;
      var img=gel('kz-art');
      img.classList.add('fade');
      clearTimeout(fadeTimer);
      fadeTimer=setTimeout(function(){
        if(art){img.src=art;img.style.display='block'}else{img.style.display='none'}
        img.classList.remove('fade');
      },500);
      gel('kz-title').textContent=t||'—';
      gel('kz-artist').textContent=a;
      gel('kz-album').textContent=alb;
    }
    var lc=d.listeners&&d.listeners.current!=null?d.listeners.current:null;
    gel('kz-count').textContent=lc!==null?lc+' listening':'—';

    var hist=(d.song_history||[]).filter(function(h){return isReal(h.song.artist,h.song.title)}).slice(0,9);
    gel('kz-hist').innerHTML=hist.map(function(h,i){
      var img=h.song.art?'<img class="hi-art" src="'+esc(h.song.art)+'" alt="" onerror="this.style.visibility=\'hidden\'">':'<div class="hi-art"></div>';
      return '<li><a class="hi" href="'+amLink(h.song.artist,h.song.title)+'" target="_blank" rel="noopener">'+
        '<span class="hi-n">'+(i+1)+'</span>'+img+
        '<div class="hi-info"><div class="hi-t">'+esc(h.song.title)+'</div><div class="hi-a">'+esc(h.song.artist)+'</div></div>'+
        '<svg class="hi-ic" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>'+
        '</a></li>';
    }).join('');
  }).catch(function(){});
}

/* ── Weather ─────────────────────────────────────── */
function loadWx(){
  fetch(WX).then(function(r){return r.json()}).then(function(d){return fetch(d.properties.forecast)}).then(function(r){return r.json()}).then(function(d){
    var p=d.properties.periods[0];
    gel('kz-wx').innerHTML='<div class="wx-row"><div class="wx-temp">'+p.temperature+'&deg;'+p.temperatureUnit+'</div>'+
      '<div><div class="wx-short">'+esc(p.shortForecast)+'</div><div class="wx-loc">Sedona, AZ &middot; NWS</div></div></div>';
  }).catch(function(){gel('kz-wx').innerHTML='<span class="kmd-err">Unavailable</span>'});
}

/* ── Boot ────────────────────────────────────────── */
loadSched();loadAZ();loadWx();
setInterval(loadAZ,30000);
setInterval(loadWx,900000);
setInterval(renderSched,60000);
})();
</script>
</body>
</html>
