<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(location.hostname==="www.mellowmountainradio.com")location.replace(location.href.replace("www.mellowmountainradio.com","mellowmountainradio.com"));</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline · KAZM Mellow Mountain Radio</title>
  <meta name="theme-color" content="#223d6e" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
      font-family: "Lato", -apple-system, Segoe UI, Roboto, sans-serif; padding: 32px;
      background: radial-gradient(130% 120% at 80% 0%, #23305c 0%, #131a34 55%, #0c1024 100%); color: #e9edff; }
    .wrap { max-width: 440px; }
    img { width: 96px; height: 96px; border-radius: 20px; margin-bottom: 22px; }
    h1 { font-size: 1.7rem; margin: 0 0 10px; }
    p { color: rgba(233, 237, 255, .78); line-height: 1.6; margin: 0 0 24px; }
    a { display: inline-block; background: #e0a85a; color: #201400; text-decoration: none; font-weight: 800;
      padding: 12px 22px; border-radius: 999px; }
    .fm { margin-top: 26px; font-size: 13px; letter-spacing: .04em; color: rgba(233, 237, 255, .5); }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/icon-192.png" alt="KAZM" />
    <h1>You're offline</h1>
    <p>Looks like the mountain lost your signal. The live stream and real-time data need a connection &mdash; reconnect and you'll be right back on air.</p>
    <a href="/">Try again</a>
    <p class="fm">KAZM &middot; 106.5 FM &amp; 780 AM &middot; Sedona, Arizona</p>
  </div>
</body>
</html>
